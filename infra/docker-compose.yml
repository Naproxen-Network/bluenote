name: little-blue-note

services:
  mysql:
    image: mysql:8.4
    container_name: lbn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${LBN_DB_PASSWORD:-lbn_dev_password}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${LBN_DB_PORT:-3306}:3306"
    volumes:
      - lbn_mysql_data:/var/lib/mysql
      - ../backend/sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ../backend/sql/seed.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.4-alpine
    container_name: lbn-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - lbn_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: lbn-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${LBN_RABBIT_USER:-lbn}
      RABBITMQ_DEFAULT_PASS: ${LBN_RABBIT_PASSWORD:-lbn_dev_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - lbn_rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: lbn-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  lbn_mysql_data:
  lbn_redis_data:
  lbn_rabbit_data:
